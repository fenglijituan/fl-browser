name: Build FL Browser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: true
        default: '1.0.0'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Windows ZIP
        run: npm run build:zip

      - name: Build Windows Installer
        run: npm run build:installer

      - name: List output files
        shell: pwsh
        run: |
          Get-ChildItem dist/ -File -Include *.zip,*.exe | ForEach-Object {
            $size = [math]::Round($_.Length/1MB, 2)
            Write-Host "File: $($_.Name) - ${size} MB"
          }

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: fl-browser-win-zip
          path: "dist/FL Browser-*-win.zip"
          retention-days: 30

      - name: Upload Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: fl-browser-win-installer
          path: "dist/FL-Browser-Setup-*.exe"
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FL Browser-*-win.zip
            dist/FL-Browser-Setup-*.exe
          generate_release_notes: true
          body: |
            ## FL Browser ${{ github.ref_name }}

            ### Downloads

            - **Portable** (ZIP) - Extract and run
            - **Installer** (EXE) - Install to system

            ### System Requirements

            - Windows 10/11 (64-bit)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
