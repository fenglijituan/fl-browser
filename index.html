<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>FL Browser</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
button>svg,button>svg>*,svg.svg-icon,svg.svg-icon>*,svg.svg-close,svg.svg-close>*{pointer-events:none!important}
html,body{height:100%;overflow:hidden;font-family:"Segoe UI",system-ui,-apple-system,sans-serif}
body{display:flex;flex-direction:column;--bg:#1e1e2e;--bg2:#181825;--bg3:#252536;--bg4:#313244;--bg5:#45475a;--text:#cdd6f4;--text2:#a6adc8;--text3:#6c7086;--border:#45475a;--accent:#89b4fa;--accent2:#74c7ec;--red:#f38ba8;--green:#a6e3a1;--yellow:#f9e2af;background:var(--bg);color:var(--text);transition:background .3s,color .3s}
body.private{--bg:#11111b;--bg2:#0a0a0f;--bg3:#181825;--bg4:#1e1e2e;--bg5:#313244;--text:#cdd6f4;--text2:#9399b2;--text3:#585b70;--border:#313244;background:var(--bg)}
body.light{--bg:#eff1f5;--bg2:#e6e9ef;--bg3:#fff;--bg4:#ccd0da;--bg5:#bcc0cc;--text:#4c4f69;--text2:#5c5f77;--text3:#9ca0b0;--border:#ccd0da;background:var(--bg);color:var(--text)}
body.ocean{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--bg4:#475569;--bg5:#64748b;--text:#f1f5f9;--text2:#cbd5e1;--text3:#94a3b8;--border:#475569;--accent:#0ea5e9;--accent2:#22d3ee;--red:#f87171;--green:#4ade80;--yellow:#fbbf24;background:var(--bg)}
body.forest{--bg:#052e16;--bg2:#14532d;--bg3:#166534;--bg4:#15803d;--bg5:#16a34a;--text:#dcfce7;--text2:#bbf7d0;--text3:#86efac;--border:#166534;--accent:#22c55e;--accent2:#4ade80;--red:#ef4444;--green:#84cc16;--yellow:#eab308;background:var(--bg)}
body.sunset{--bg:#450a0a;--bg2:#7f1d1d;--bg3:#991b1b;--bg4:#b91c1c;--bg5:#dc2626;--text:#fecaca;--text2:#fca5a5;--text3:#f87171;--border:#991b1b;--accent:#ef4444;--accent2:#f87171;--red:#fca5a5;--green:#4ade80;--yellow:#fbbf24;background:var(--bg)}
body.neon{--bg:#0f0f23;--bg2:#1a1a3e;--bg3:#2d2d6d;--bg4:#3d3d8f;--bg5:#4d4dbf;--text:#e0e0ff;--text2:#b0b0ff;--text3:#8080cc;--border:#3d3d8f;--accent:#8b5cf6;--accent2:#a78bfa;--red:#f472b6;--green:#34d399;--yellow:#fbbf24;background:var(--bg)}
body.light .titlebar{background:var(--bg3)}
body.light .tabbar{background:var(--bg2)}
body.light .toolbar{background:var(--bg3)}
body.light .address-bar{background:var(--bg2);border-color:var(--border)}
body.light .btn:hover{background:rgba(0,0,0,.06)}
body.light .tab{background:var(--bg4)}
body.light .tab.active{background:var(--bg3);color:var(--text)}
body.light .popup-menu,body.light .security-panel{background:var(--bg3);box-shadow:0 8px 32px rgba(0,0,0,.15)}
body.light .newtab{background:linear-gradient(135deg,#eff1f5,#e6e9ef,#ccd0da)}
body.light .newtab-title{color:var(--text)}
body.light .search-box{background:var(--bg3);border-color:var(--border)}
body.light .search-input{color:var(--text)}
body.light .search-input::placeholder{color:var(--text3)}
body.light .shortcut-item{background:var(--bg3)}
body.light .shortcut-item:hover{background:var(--bg4)}
body.light .shortcut-name{color:var(--text2)}
body.light .sidebar-tab{background:var(--bg4)}
body.light .sidebar-tab.active{background:var(--bg3)}
body.light .bkm-item{color:var(--text2)}
body.light .bkm-item:hover{background:rgba(0,0,0,.06)}
body.light .popup-menu-item:hover{background:rgba(0,0,0,.06)}
body.light .settings-nav-item:hover{background:rgba(0,0,0,.06)}
body.light .settings-nav-item.active{background:var(--bg5);color:var(--text)}

.svg-icon{stroke:var(--text2);fill:var(--text2)}
.svg-icon path{stroke:var(--text2);fill:var(--text2)}
.svg-icon rect{stroke:var(--text2);fill:var(--text2)}
.svg-icon circle{stroke:var(--text2);fill:var(--text2)}
.svg-close{stroke:var(--text);fill:var(--text)}
.svg-close path{stroke:var(--text);fill:var(--text)}
body.light .svg-icon{stroke:var(--text2);fill:var(--text2)}
body.light .svg-icon path{stroke:var(--text2);fill:var(--text2)}
body.light .svg-icon rect{stroke:var(--text2);fill:var(--text2)}
body.light .svg-icon circle{stroke:var(--text2);fill:var(--text2)}
body.light .svg-close{stroke:var(--text);fill:var(--text)}
body.light .svg-close path{stroke:var(--text);fill:var(--text)}

.titlebar{height:34px;background:var(--bg2);display:flex;align-items:center;-webkit-app-region:drag;border-bottom:1px solid var(--border);z-index:500;flex-shrink:0}
.window-title{font-size:12px;color:var(--text3);flex:1;padding-left:14px;user-select:none}
.titlebar-btns{display:flex;-webkit-app-region:no-drag;height:100%}
.titlebar-btn{width:46px;height:100%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;position:relative;z-index:501;-webkit-app-region:no-drag}
.titlebar-btn:hover{background:rgba(128,128,128,.15)}
.titlebar-btn.close:hover{background:#e81123}
.titlebar-btn.close:hover svg{stroke:#fff;fill:#fff}
.titlebar-btn.close:hover svg path{stroke:#fff;fill:#fff}

.bookmarks-bar{height:32px;background:var(--bg);display:flex;align-items:center;padding:0 8px;border-bottom:1px solid var(--border);overflow:hidden;flex-shrink:0;gap:2px}
.bookmarks-bar.hidden{display:none}
.bkm-item{display:flex;align-items:center;gap:5px;padding:3px 10px;font-size:12px;color:var(--text2);border-radius:6px;cursor:pointer;white-space:nowrap;transition:background .15s;position:relative}
.bkm-item:hover{background:rgba(128,128,128,.1);color:var(--text)}
.bkm-delete{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:16px;height:16px;display:none;align-items:center;justify-content:center;border-radius:4px;background:rgba(243,139,168,.15);cursor:pointer;opacity:.7}
.bkm-item:hover .bkm-delete{display:flex}
.bkm-delete:hover{opacity:1}

.tabbar{height:38px;background:var(--bg2);display:flex;align-items:flex-end;padding:0 8px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.tabs{display:flex;flex:1;overflow-x:auto;overflow-y:hidden;gap:2px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:var(--bg4);padding:0 10px 0 14px;height:34px;display:flex;align-items:center;border-radius:10px 10px 0 0;cursor:pointer;min-width:80px;max-width:210px;transition:background .15s;position:relative;user-select:none;font-size:12px;gap:4px;flex-shrink:0}
.tab.active{background:var(--bg);color:var(--text);font-weight:500}
.tab:hover:not(.active){background:var(--bg5)}
.tab-favicon{width:16px;height:16px;border-radius:2px;flex-shrink:0;font-size:11px;display:flex;align-items:center;justify-content:center}
.tab-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tab-close{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .15s,background .15s}
.tab:hover .tab-close,.tab.active .tab-close{opacity:1}
.tab-close:hover{background:rgba(128,128,128,.2)}
.tab-sleeping{opacity:.5}
.tab-group-indicator{position:absolute;bottom:0;left:8px;right:8px;height:3px;border-radius:3px 3px 0 0}
.add-tab{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;transition:background .15s;flex-shrink:0;margin-left:2px}
.add-tab:hover{background:rgba(128,128,128,.12)}
.tab-actions-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:6px;transition:background .15s;flex-shrink:0;margin-left:2px}
.tab-actions-btn:hover{background:rgba(128,128,128,.12)}

.vertical-tabs-sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:none;flex-direction:column;flex-shrink:0;overflow:hidden}
.vertical-tabs-sidebar.show{display:flex}
.vertical-tabs-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.vertical-tabs-header span{font-size:13px;font-weight:600;color:var(--text)}
.vertical-tabs-list{flex:1;overflow-y:auto;padding:4px}
.sidebar-tab{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--text2);transition:background .15s;margin-bottom:1px}
.sidebar-tab:hover{background:var(--bg4)}
.sidebar-tab.active{background:var(--bg5);color:var(--text)}
.sidebar-tab-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.toolbar{height:46px;background:var(--bg);display:flex;align-items:center;padding:0 6px;gap:2px;flex-shrink:0;border-bottom:1px solid var(--border)}
.btn{width:34px;height:34px;border:none;background:transparent;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s;color:var(--text2);flex-shrink:0}
.btn:hover{background:rgba(128,128,128,.1)}
.btn:disabled{opacity:.3;cursor:default}
.btn:disabled:hover{background:transparent}
.btn.active{background:rgba(137,180,250,.15);color:var(--accent)}

.address-bar{flex:1;display:flex;align-items:center;background:var(--bg3);border-radius:22px;height:36px;padding:0 10px;margin:0 6px;border:1px solid transparent;transition:border-color .2s,background .2s}
.address-bar:focus-within{background:var(--bg);border-color:var(--accent)}
.address-bar:hover:not(:focus-within){background:var(--bg4)}
.address-input{flex:1;border:none;outline:none;background:transparent;color:var(--text);font-size:13px;min-width:0}
.address-input::placeholder{color:var(--text3)}
.address-suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg3);border:1px solid var(--border);border-radius:12px;max-height:300px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.3);z-index:3000;display:none}
.address-suggestions.show{display:block}
.suggestion-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;font-size:13px;color:var(--text);transition:background .1s}
.suggestion-item:hover,.suggestion-item.highlighted{background:var(--accent);color:var(--bg)}
.suggestion-item .sug-icon{width:16px;text-align:center;flex-shrink:0}
.suggestion-item .sug-url{color:var(--text3);font-size:11px}
.suggestion-item:hover .sug-url,.suggestion-item.highlighted .sug-url{color:var(--bg2)}
.address-secure{display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s}
.address-secure:hover{background:rgba(128,128,128,.1)}
.address-secure.secure{color:var(--green)}
.address-secure.insecure{color:var(--red)}

.content{flex:1;position:relative;background:var(--bg);overflow:hidden}
.fullscreen .titlebar,.fullscreen .tabbar,.fullscreen .toolbar,.fullscreen .bookmarks-bar{display:none}
.page{display:none;position:absolute;top:0;left:0;width:100%;height:100%}
.page.active{display:block}
webview{width:100%;height:100%}

.newtab{background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 50%,var(--bg3) 100%);display:flex;flex-direction:column;align-items:center;padding-top:6%;min-height:100%}
.newtab-logo{font-size:42px;font-weight:200;color:var(--text);letter-spacing:6px;margin-bottom:8px;user-select:none}
.newtab-subtitle{font-size:13px;color:var(--text3);margin-bottom:28px}
.search-box{width:560px;max-width:90%;height:46px;background:var(--bg3);border:1px solid var(--border);border-radius:24px;display:flex;align-items:center;padding:0 16px;transition:border-color .2s,box-shadow .2s}
.search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(137,180,250,.2)}
.search-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px}
.search-input::placeholder{color:var(--text3)}
.quick-links{display:flex;gap:12px;margin-top:32px;flex-wrap:wrap;justify-content:center;max-width:700px}
.quick-link{display:flex;flex-direction:column;align-items:center;padding:14px 12px;border-radius:12px;cursor:pointer;transition:all .2s;min-width:76px;text-decoration:none}
.quick-link:hover{background:rgba(128,128,128,.1);transform:translateY(-3px)}
.quick-link-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:8px;font-weight:700}
.quick-link-icon svg{pointer-events:none}
.quick-link-add{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:2px dashed var(--border);color:var(--text3);font-size:22px;margin-bottom:8px;transition:border-color .2s,color .2s}
.quick-link:hover .quick-link-add{border-color:var(--accent);color:var(--accent)}
.quick-link-name{font-size:11px;color:var(--text2);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}

.settings{display:flex;height:100%;background:var(--bg)}
.settings-sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.settings-logo{padding:16px 18px;font-size:15px;font-weight:600;color:var(--text);border-bottom:1px solid var(--border)}
.settings-nav{flex:1;overflow-y:auto;padding:8px}
.settings-nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.settings-nav-item:hover{background:rgba(128,128,128,.08);color:var(--text)}
.settings-nav-item.active{background:var(--bg5);color:var(--text);font-weight:500}
.settings-main{flex:1;overflow-y:auto}
.settings-header{padding:28px 32px 20px;border-bottom:1px solid var(--border)}
.settings-header h1{font-size:26px;font-weight:400;color:var(--text)}
.settings-panel{padding:24px 32px;display:none}
.settings-panel.active{display:block}
.settings-section{margin-bottom:36px}
.settings-section-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:6px}
.settings-section-desc{font-size:12px;color:var(--text3);margin-bottom:16px}
.settings-card{background:var(--bg3);border-radius:12px;overflow:hidden}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);min-height:52px}
.setting-row:last-child{border-bottom:none}
.setting-info{flex:1;min-width:0;padding-right:16px}
.setting-label{font-size:13px;color:var(--text);line-height:1.4}
.setting-desc{font-size:11px;color:var(--text3);margin-top:2px}

.btn-primary{background:var(--accent);color:var(--bg);border:none;border-radius:6px;padding:8px 18px;font-size:13px;cursor:pointer;transition:opacity .2s;font-weight:500}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:var(--bg5);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;transition:background .2s}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red);border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;transition:all .2s}
.btn-danger:hover{background:var(--red);color:#fff}

.toggle-switch{width:42px;height:24px;background:var(--text3);border-radius:12px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-switch.on{background:var(--accent)}
.toggle-switch::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .25s}
.toggle-switch.on::after{transform:translateX(18px)}
.setting-select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:13px;outline:none;cursor:pointer}
.setting-select:focus{border-color:var(--accent)}
.setting-input{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 12px;font-size:13px;outline:none;width:220px}
.setting-input:focus{border-color:var(--accent)}

.theme-options{display:flex;gap:20px}
.theme-option{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:10px 14px;border-radius:10px;transition:all .15s;border:2px solid transparent}
.theme-option:hover{background:rgba(128,128,128,.06)}
.theme-option.active{border-color:var(--accent);background:rgba(137,180,250,.08)}
.theme-preview{width:52px;height:52px;border-radius:12px;border:1px solid var(--border)}
.theme-option span{font-size:12px;color:var(--text2)}

.popup-menu{position:fixed;top:126px;right:10px;width:300px;background:var(--bg3);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.35);display:none;border:1px solid var(--border);z-index:2000;max-height:78vh;overflow-y:auto;padding:6px}
.popup-menu.show{display:block}
.popup-menu-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;font-size:13px;color:var(--text);border-radius:6px;transition:background .12s;border:none;background:none;width:100%;text-align:left}
.popup-menu-item:hover{background:rgba(128,128,128,.1)}
.popup-menu-item:active{background:rgba(128,128,128,.15)}
.popup-menu-divider{height:1px;background:var(--border);margin:5px 8px}
.popup-menu-shortcut{margin-left:auto;font-size:11px;color:var(--text3)}
.popup-menu-icon{width:20px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center}

.security-panel{position:fixed;top:126px;left:10px;width:360px;background:var(--bg3);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.35);display:none;border:1px solid var(--border);z-index:2000;overflow:hidden}
.history-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg3);border-radius:10px;margin-bottom:6px;transition:background .15s}
.history-item:hover{background:var(--bg4)}
.history-item-content{flex:1;min-width:0;cursor:pointer}
.history-item-title{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item-url{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item-time{font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap}
.history-item-delete{opacity:0;background:transparent;border:1px solid var(--border);color:var(--text3);padding:4px 10px;font-size:11px;border-radius:6px;cursor:pointer;transition:all .15s}
.history-item:hover .history-item-delete{opacity:1}
.history-item-delete:hover{background:var(--red);color:var(--bg);border-color:var(--red)}
.history-actions{display:flex;align-items:center;margin-bottom:16px}
.history-group{margin-bottom:20px}
.history-group-label{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.security-panel-header{padding:22px;text-align:center;border-bottom:1px solid var(--border)}
.security-panel-icon{width:56px;height:56px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.security-panel-icon.secure{background:rgba(166,227,161,.15)}
.security-panel-icon.insecure{background:rgba(243,139,168,.15)}
.security-panel-title{font-size:15px;font-weight:600;color:var(--text)}
.security-panel-domain{font-size:12px;color:var(--text3);margin-top:4px;word-break:break-all}
.security-panel-section{padding:16px 18px;border-bottom:1px solid var(--border)}
.security-panel-section:last-child{border-bottom:none}
.security-panel-section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.security-panel-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px;color:var(--text)}
.security-panel-status{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:500}
.security-panel-status.blocked{background:rgba(243,139,168,.15);color:var(--red)}
.security-panel-status.allowed{background:rgba(166,227,161,.15);color:var(--green)}
.security-panel-btn{width:100%;padding:11px;background:var(--accent);border:none;border-radius:8px;color:var(--bg);cursor:pointer;font-size:13px;font-weight:500;transition:opacity .2s;margin:4px 18px 18px;width:calc(100% - 36px)}
.security-panel-btn:hover{opacity:.85}
.security-panel.show{display:block}

.reader-mode{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:3000;display:none;flex-direction:column}
.reader-mode.show{display:flex}
.reader-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.reader-title{font-size:15px;font-weight:600;color:var(--text)}
.reader-controls{display:flex;align-items:center;gap:4px}
.reader-btn{width:36px;height:36px;border:none;background:transparent;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .15s;font-size:14px}
.reader-btn:hover{background:rgba(128,128,128,.1)}
.reader-content{flex:1;overflow-y:auto;padding:50px 18%;color:var(--text);font-size:17px;line-height:1.8;max-width:900px;margin:0 auto;width:100%}
.reader-content h1{font-size:30px;font-weight:500;margin-bottom:24px;color:var(--text);line-height:1.3}
.reader-content p{margin-bottom:18px}

.read-aloud-panel{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--bg3);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 12px 40px rgba(0,0,0,.4);z-index:2600;border:1px solid var(--border);min-width:320px}
.read-aloud-panel.hidden{display:none}
.read-aloud-btn{width:32px;height:32px;border:none;background:transparent;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.read-aloud-btn:hover{background:rgba(128,128,128,.1)}
.read-aloud-btn.active{background:rgba(137,180,250,.15);color:var(--accent)}
.read-aloud-btn.play{width:36px;height:36px;border-radius:50%;background:var(--accent);color:var(--bg)}
.read-aloud-btn.play:hover{opacity:.85}
.read-aloud-separator{width:1px;height:24px;background:var(--border)}
.read-aloud-select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 10px;font-size:12px;outline:none;cursor:pointer;width:120px}
.read-aloud-select:focus{border-color:var(--accent)}
.read-aloud-speed{display:flex;align-items:center;gap:8px}
.read-aloud-speed input[type="range"]{width:100px;height:4px;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
.read-aloud-speed input[type="range"]::-webkit-slider-thumb{width:14px;height:14px;background:var(--accent);border-radius:50%;cursor:pointer}
.read-aloud-speed span{font-size:12px;color:var(--text3);min-width:35px}

.translate-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg3);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.4);z-index:2700;border:1px solid var(--border);min-width:420px;max-width:600px;width:90%;max-height:80vh;display:none;flex-direction:column}
.translate-panel.show{display:flex}
.translate-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.translate-title{font-size:15px;font-weight:600;color:var(--text)}
.translate-close{width:28px;height:28px;border:none;background:transparent;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .15s}
.translate-close:hover{background:rgba(128,128,128,.1)}
.translate-body{flex:1;overflow-y:auto;padding:16px 20px}
.translate-input-row{display:flex;gap:8px;margin-bottom:12px}
.translate-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;resize:none;font-family:inherit;min-height:60px}
.translate-input:focus{border-color:var(--accent)}
.translate-arrow{display:flex;align-items:center;color:var(--text3);cursor:pointer;padding:8px;border-radius:6px;transition:all .15s}
.translate-arrow:hover{background:rgba(128,128,128,.1);color:var(--accent)}
.translate-lang-row{display:flex;gap:12px;margin-bottom:12px}
.translate-lang-select{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:12px;outline:none;cursor:pointer}
.translate-lang-select:focus{border-color:var(--accent)}
.translate-result{background:var(--bg);border:1px solid var(--accent);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;line-height:1.6;min-height:60px}
.translate-actions{display:flex;gap:8px;padding:16px 20px;border-top:1px solid var(--border);flex-shrink:0}
.translate-btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .2s}
.translate-btn.primary{background:var(--accent);color:var(--bg)}
.translate-btn.secondary{background:var(--bg);border:1px solid var(--border);color:var(--text)}
.translate-btn:hover{opacity:.85}
.translate-history{margin-top:16px}
.translate-history-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.translate-history-list{max-height:120px;overflow-y:auto}
.translate-history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-radius:6px;margin-bottom:6px;cursor:pointer;transition:background .15s}
.translate-history-item:hover{background:var(--bg4)}
.translate-history-text{font-size:12px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.translate-history-lang{font-size:10px;color:var(--text3);margin-left:8px}
.translate-history-delete{opacity:0;transition:opacity .15s;color:var(--red)}
.translate-history-item:hover .translate-history-delete{opacity:1}

.find-bar{position:fixed;top:calc(50% - 24px);left:50%;transform:translateX(-50%);background:var(--bg3);border-radius:12px;padding:8px;display:flex;align-items:center;gap:8px;box-shadow:0 12px 40px rgba(0,0,0,.4);z-index:2500;border:1px solid var(--border);min-width:380px}
.find-bar.hidden{display:none}
.find-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(137,180,250,.2)}
.find-input-wrapper{flex:1;display:flex;align-items:center;background:var(--bg);border-radius:8px;padding:4px 10px}
.find-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;width:200px}
.find-input::placeholder{color:var(--text3)}
.find-count{font-size:11px;color:var(--text3);min-width:40px;text-align:center;padding:4px 8px;background:var(--bg);border-radius:6px}
.find-count.highlight{color:var(--accent);font-weight:500}
.find-btns{display:flex;gap:2px}
.find-btn{width:28px;height:28px;border:none;background:transparent;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .15s}
.find-btn:hover,.find-btn.active{background:rgba(137,180,250,.15);color:var(--accent)}
.find-close{cursor:pointer;padding:4px;border-radius:4px;transition:background .15s;display:flex}
.find-close:hover{background:rgba(128,128,128,.1)}
.find-options{display:flex;gap:4px;margin-left:4px}
.find-option{width:24px;height:24px;border:none;background:transparent;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s;font-size:11px;font-weight:600}
.find-option.active{color:var(--accent);background:rgba(137,180,250,.15)}

.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:5000;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--bg3);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.3);opacity:0;transform:translateY(12px);transition:all .25s;pointer-events:auto;border:1px solid var(--border)}
.toast.show{opacity:1;transform:translateY(0)}
.toast-msg{font-size:12px;color:var(--text)}
.toast.success{border-left:3px solid var(--green)}
.toast.warning{border-left:3px solid var(--yellow)}
.toast.info{border-left:3px solid var(--accent)}

.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);z-index:4000;display:flex;align-items:center;justify-content:center}
.dialog{background:var(--bg3);border-radius:16px;padding:28px 32px;min-width:380px;max-width:520px;color:var(--text);border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.4)}
.dialog h2{font-size:17px;font-weight:500;margin-bottom:18px}
.dialog-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:22px}
.dialog select,.dialog input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;width:100%}
.dialog select:focus,.dialog input:focus{border-color:var(--accent);outline:none}

.tab-preview{position:fixed;pointer-events:none;z-index:6000;background:var(--bg3);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.5);border:1px solid var(--border);padding:12px;display:none;min-width:260px}
.tab-preview.show{display:block}
.tab-preview .preview-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px}
.tab-preview .preview-url{font-size:11px;color:var(--text3);word-break:break-all}
.tab-preview .preview-img{width:240px;height:140px;background:var(--bg);border-radius:4px;margin-top:8px}

.split-pane{display:flex;height:100%}
.split-pane .pane{flex:1;overflow:hidden;position:relative}
.split-pane .pane-divider{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s}
.split-pane .pane-divider:hover{background:var(--accent)}

.progress-bar{position:absolute;top:0;left:0;height:3px;background:var(--accent);z-index:100;transition:width .3s;width:0;border-radius:0 2px 2px 0}
.progress-bar.done{background:var(--green);width:100%!important;opacity:0;transition:opacity .5s}
</style>
</head>

</div>

<button class="btn" id="btnVerticalTab"><svg width="18" height="18" viewBox="0 0 24 24" class="svg-icon"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg></button>
<button class="btn" id="btnMenu"><svg width="18" height="18" viewBox="0 0 24 24" class="svg-icon"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></button>

<button class="popup-menu-item" data-action="passwords"><span class="popup-menu-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="var(--text2)"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.7 1.3-3 3-3s3 1.3 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg></span><span>密码</span></button>

<script>
(function(){
var ELEC;try{ELEC=require('electron')}catch(e){ELEC=null}
var ipc=ELEC?ELEC.ipcRenderer:null;
function ipcSend(ch){if(ipc)try{ipc.send(ch)}catch(e){}}
function G(id){return document.getElementById(id)}
var tabs=[],activeTabId=null,readerFS=17,isBookmarked=false,zoomPct=100,isSpeaking=false;
var findReqId=null,findMatches=0,findIdx=0,collections=[],bookmarks=[],historyItems=[],downloadsList=[];
var savedPwd=JSON.parse((typeof localStorage!=='undefined'?localStorage.getItem('fl_pwd'):null)||'[]');
var visitHistory=JSON.parse((typeof localStorage!=='undefined'?localStorage.getItem('fl_vhist'):null)||'[]');
var settings={theme:'深色',se:'Google',startup:'newtab',startupUrl:'',smartscreen:true,adblock:false,askPwd:true,autoLogin:true,showBkmBar:false,showHomeBtn:true,trackingLevel:'balanced',efficiencyMode:false,verticalTabs:false,tabGroups:{}};

function loadSettings(){try{var s=localStorage.getItem('fl_settings');if(s)Object.assign(settings,JSON.parse(s))}catch(e){}}
function saveSettings(){try{localStorage.setItem('fl_settings',JSON.stringify(settings))}catch(e){}}
loadSettings();

function toast(msg,type){type=type||'info';var c=G('toastContainer');if(!c)return;var t=document.createElement('div');t.className='toast '+type;t.innerHTML='<span class="toast-msg">'+msg+'</span>';c.appendChild(t);requestAnimationFrame(function(){t.classList.add('show')});setTimeout(function(){t.classList.remove('show');setTimeout(function(){if(t.parentNode)t.remove()},300)},2800)}

function safeBind(id,evt,fn){var el=G(id);if(el){el.addEventListener(evt,fn);return true}return false}

function getBtnId(el){
while(el&&el!==document.body){
if(el.id)return el.id;
el=el.parentElement;
}
return null;
}
function initUI(){
document.addEventListener('click',function(e){
var target=e.target;
var actionEl=target.closest('[data-action]');
if(actionEl){
if(actionEl.closest('#menuPopup')){
e.stopPropagation();
handleMenuAction(actionEl.getAttribute('data-action'));
closeMenu();
return;
}
}
var btnId=getBtnId(target);
if(!e.target.closest('#securityPanel')&&!e.target.closest('#btnSecurity')){var sp=G('securityPanel');if(sp)sp.classList.remove('show')}
if(!e.target.closest('#menuPopup')&&!e.target.closest('#btnMenu'))closeMenu();
if(!e.target.closest('#urlInput')&&!e.target.closest('#urlSuggestions'))hideSuggestions();
if(!btnId)return;
switch(btnId){
case'btnMin':ipcSend('min');break
case'btnMax':ipcSend('max');break
case'btnClose':ipcSend('close');break
case'btnBack':navBack();break
case'btnForward':navForward();break
case'btnRefresh':refreshTab();break
case'btnHome':navigate('http://browser-home.windfl.dpdns.org/');break
case'btnSecurity':toggleSecurityPanel();break
case'btnBookmark':toggleBookmark();break
case'btnReader':toggleReader();break
case'btnCollections':showCollections();break
case'btnVerticalTab':toggleVerticalTabs();break
case'btnMenu':toggleMenu();break
case'btnAddTab':createTab('newtab');break
case'btnCloseVerticalTabs':toggleVerticalTabs();break
case'tabActionsBtn':showTabActions();break
case'readerClose':closeReader();break
case'readerFontDown':adjustReaderFont(-1);break
case'readerFontUp':adjustReaderFont(1);break
case'readerThemeToggle':toggleReaderTheme();break
case'findPrevBtn':findAction('prev');break
case'findNextBtn':findAction('next');break
case'findCloseBtn':closeFind();break
case'findCase':toggleFindOption('caseSensitive');break
case'findRegex':toggleFindOption('regex');break
case'findWhole':toggleFindOption('wholeWord');break
case'readAloudToggle':doReadAloud();break
case'readAloudPrev':readAloudIndex=Math.max(0,readAloudIndex-500);if(isSpeaking){stopReadAloud();doReadAloud()}break
case'readAloudNext':readAloudIndex=Math.min(readAloudText.length,readAloudIndex+500);if(isSpeaking){stopReadAloud();doReadAloud()}break
case'readAloudSpeedDown':adjustReadAloudSpeed(-0.1);break
case'readAloudSpeedUp':adjustReadAloudSpeed(0.1);break
case'readAloudClose':stopReadAloud();break
case'translateClose':hideTranslate();break
case'translateSwap':swapLangs();break
case'translateClear':clearTranslate();break
case'translateBtn':doTranslate();break
}
});
document.addEventListener('click',function(e){if(!e.target.closest('#translatePanel')&&!e.target.closest('[data-action="translate"]'))hideTranslate()});
safeBind('readAloudVoice','change',function(){setReadAloudVoice(this.value)});
safeBind('readAloudSpeedSlider','input',function(){setReadAloudSpeed(this.value)});
safeBind('translateInput','keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doTranslate()}});
safeBind('urlInput','keydown',function(e){if(e.key==='Enter'){var v=this.value.trim();if(v)navigate(v);hideSuggestions()}});
safeBind('urlInput','input',function(){showSuggestions(this.value)});
safeBind('urlInput','keydown',function(e){if(e.key==='ArrowDown'||e.key==='ArrowUp'){e.preventDefault();navSuggestions(e.key)}});
safeBind('findInput','keydown',function(e){if(e.key==='Enter')findAction('next');else if(e.key==='Escape')closeFind();else{clearTimeout(this._ft);var self=this;this._ft=setTimeout(function(){doFind(self.value)},150)}});
document.addEventListener('keydown',handleKeyboard);
if(ipc){ipc.on('fullscreen-changed',function(e,f){document.body.classList.toggle('fullscreen',!!f)});ipc.on('private-mode',function(e,p){if(p)document.body.classList.add('private')})}
applyTheme(settings.theme);
var vts=G('verticalTabsSidebar');if(vts){if(settings.verticalTabs)vts.classList.add('show');else vts.classList.remove('show')}
var bkm=G('bookmarksBar');if(bkm){if(settings.showBkmBar)bkm.classList.remove('hidden');else bkm.classList.add('hidden')}
updateBkmBar();
updateZoomDisplay();
var hb=G('btnHome');if(hb)hb.style.display=settings.showHomeBtn?'':'none';
}

function handleMenuAction(action){
closeMenu();
switch(action){
case'newtab':createTab('newtab');break
case'new-window':ipcSend('new-window');break
case'new-private-window':ipcSend('new-private-window');break
case'zoom':adjustZoom(10);break
case'bookmarks':createTab('bookmarks');break
case'history':createTab('history');break
case'downloads':createTab('downloads');break
case'extensions':createTab('extensions');break
case'passwords':showPasswords();break
case'clear-data':showClearData();break
case'collections':showCollections();break
case'print':doPrint();break
case'translate':navigate('https://translate.google.com/');break
case'split':toggleSplit();break
case'screenshot':doScreenshot();break
case'find':toggleFind();break
case'readaloud':doReadAloud();break
case'customize':showCustomize();break
case'dev-tools':ipcSend('dev-tools');break
case'settings':createTab('settings');break
case'help':showHelp();break
case'close-browser':ipcSend('close');break
}
}

function handleKeyboard(e){
var ctrl=e.ctrlKey||e.metaKey;
if(e.key==='F11'){e.preventDefault();ipcSend('toggle-fullscreen');return}
if(e.key==='F12'){e.preventDefault();ipcSend('dev-tools');return}
if(ctrl&&e.key==='t'){e.preventDefault();createTab('newtab');return}
if(ctrl&&e.key==='w'){e.preventDefault();closeCurrentTab();return}
if(ctrl&&e.key==='f'){e.preventDefault();toggleFind();return}
if(ctrl&&e.key==='h'){e.preventDefault();createTab('history');return}
if(ctrl&&e.key==='j'){e.preventDefault();createTab('downloads');return}
if(ctrl&&e.shiftKey&&e.key==='N'){e.preventDefault();ipcSend('new-private-window');return}

}

function createTab(type,url){
var id='t'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
var tabNames={newtab:'新标签页',settings:'设置',history:'历史记录',bookmarks:'书签',downloads:'下载',extensions:'扩展',siteinfo:'站点信息',collections:'集锦'};
var title=tabNames[type]||(url?(url.length>45?url.slice(0,45)+'…':url):'新标签页');
var groupId=settings.tabGroups&&activeTabId?settings.tabGroups[activeTabId]||null:null;
tabs.push({id:id,title:title,type:type,url:url,group:groupId,sleeping:false,zoom:1,muted:false});
renderTabs();switchTab(id);renderPage(id,type,url);
if(type!=='web'){var u=G('urlInput');if(u)u.value='flb://'+type+'/'}
updateVerticalTabs();
}

function switchTab(id){
if(activeTabId&&settings.tabGroups&&settings.tabGroups[activeTabId]){
settings.tabGroups[id]=settings.tabGroups[activeTabId]
}
activeTabId=id;renderTabs();
var pages=document.querySelectorAll('.page');for(var i=0;i<pages.length;i++)pages[i].classList.remove('active');
var pg=G('page_'+id);if(pg)pg.classList.add('active');
var tab=tabs.find(function(t){return t.id===id});if(!tab)return;
var u=G('urlInput');if(u){
if(tab.type==='web')u.value=tab.url||'';
else if(tab.type==='newtab'||tab.type==='page')u.value='';
else u.value='flb://'+tab.type+'/'
}
updateNavButtons();updateVerticalTabs();updateBookmarkState();
updateSecurityBadge(tab.type==='web'?tab.url:'');
}

function closeCurrentTab(){if(activeTabId)closeTab(activeTabId)}
function closeTab(id){
if(tabs.length<=1){toast('至少保留一个标签页','warning');return}
var idx=tabs.findIndex(function(t){return t.id===id});
tabs.splice(idx,1);var pg=G('page_'+id);if(pg)pg.remove();
if(activeTabId===id){var nt=tabs[Math.min(idx,tabs.length-1)];if(nt)switchTab(nt.id)}

}

function mockTranslate(text,from,to){return new Promise(function(resolve){setTimeout(function(){var translations={en:{zh:'这是一个测试翻译',en:'This is a test translation',ja:'これはテスト翻訳です',ko:'이것은 테스트 번역입니다',fr:"Ceci est une traduction de test",de:"Dies ist eine Testübersetzung",es:"Esta es una traducción de prueba",ru:"Это тестовый перевод"},zh:{en:'This is a test translation',zh:'这是测试文本',ja:'これはテストテキストです',ko:'이것은 테스트 텍스트입니다',fr:"Ceci est un texte de test",de:"Dies ist ein Testtext",es:"Este es un texto de prueba",ru:"Это тестовый текст"},ja:{zh:'这是日语测试文本',en:'This is Japanese test text',ja:'これは日本語のテストテキストです',ko:'이것은 일본어 테스트 텍스트입니다',fr:"Ceci est un texte de test japonais",de:"Dies ist ein japanischer Testtext",es:"Este es un texto de prueba japonés",ru:"Это японский тестовый текст"},ko:{zh:'这是韩语测试文本',en:'This is Korean test text',ja:'これは韓国語のテストテキストです',ko:'이것은 한국어 테스트 텍스트입니다',fr:"Ceci est un texte de test coréen",de:"Dies ist ein koreanischer Testtext",es:"Este es un texto de prueba coreano",ru:"Это корейский тестовый текст"},fr:{zh:'这是法语测试文本',en:'This is French test text',ja:'これはフランス語のテストテキストです',ko:'이것은 프랑스어 테스트 텍스트입니다',fr:"Ceci est un texte de test français",de:"Dies ist ein französischer Testtext",es:"Este es un texto de prueba francés",ru:"Это французский тестовый текст"},de:{zh:'这是德语测试文本',en:'This is German test text',ja:'これはドイツ語のテストテキストです',ko:'이것은 독일어 테스트 텍스트입니다',fr:"Ceci est un texte de test allemand",de:"Dies ist ein deutscher Testtext",es:"Este es un texto de prueba alemán",ru:"Это немецкий тестовый текст"},es:{zh:'这是西班牙语测试文本',en:'This is Spanish test text',ja:'これはスペイン語のテストテキストです',ko:'이것은 스페인어 테스트 텍스트입니다',fr:"Ceci est un texte de test espagnol",de:"Dies ist ein spanischer Testtext",es:"Este es un texto de prueba español",ru:"Это испанский тестовый текст"},ru:{zh:'这是俄语测试文本',en:'This is Russian test text',ja:'これはロシア語のテストテキストです',ko:'이것은 러시아어 테스트 텍스트입니다',fr:"Ceci est un texte de test russe",de:"Dies ist ein russischer Testtext",es:"Este es un texto de prueba ruso",ru:"Это русский тестовый текст"}};var detected=detectLang(text);var src=from==='auto'?detected:from;resolve(translations[src]&&translations[src][to]||'翻译结果: '+text)},500+Math.random()*500)})}
function detectLang(text){var chinese=/[\u4e00-\u9fa5]/;var japanese=/[\u3040-\u30ff\u3400-\u4dbf]/;var korean=/[\uac00-\ud7af]/;if(chinese.test(text))return'zh';if(japanese.test(text))return'ja';if(korean.test(text))return'ko';return'en'}

function applyTheme(name){
document.body.classList.remove('light','private','ocean','forest','sunset','neon','custom');
if(name==='浅色')document.body.classList.add('light');
else if(name==='深色'){}
else if(['ocean','forest','sunset','neon'].includes(name))document.body.classList.add(name);
else if(name==='custom'){document.body.classList.add('custom');applyCustomColors()}
if(name==='private')document.body.classList.add('private');

}
function applyCustomColors(){
var accent=settings.customAccent||'#89b4fa';
var bg=settings.customBg||'#1e1e2e';
var text=settings.customText||'#cdd6f4';
var bg2=adjustColor(bg,-20);
var bg3=adjustColor(bg,15);
var bg4=adjustColor(bg,30);
var bg5=adjustColor(bg,50);
var text2=adjustColor(text,-25);
var text3=adjustColor(text,-50);
var border=adjustColor(bg,40);
document.documentElement.style.setProperty('--custom-accent',accent);
document.documentElement.style.setProperty('--custom-bg',bg);
document.documentElement.style.setProperty('--custom-bg2',bg2);
document.documentElement.style.setProperty('--custom-bg3',bg3);
document.documentElement.style.setProperty('--custom-bg4',bg4);
document.documentElement.style.setProperty('--custom-bg5',bg5);
document.documentElement.style.setProperty('--custom-text',text);
document.documentElement.style.setProperty('--custom-text2',text2);
document.documentElement.style.setProperty('--custom-text3',text3);
document.documentElement.style.setProperty('--custom-border',border);

function adjustColor(hex,percent){
var num=parseInt(hex.replace('#',''),16);
var amt=Math.round(2.55*percent);
var R=(num>>16)+amt;
var G=(num>>8&0x00FF)+amt;
var B=(num&0x0000FF)+amt;
return '#'+(0x1000000+
(Math.max(0,Math.min(255,R))*0x10000)+
(Math.max(0,Math.min(255,G))*0x100)+
Math.max(0,Math.min(255,B))).toString(16).slice(1)
}

window._flToggleExt=function(extId){
if(!ELEC||!ELEC.ipcRenderer){toast('IPC不可用','warning');return}
ELEC.ipcRenderer.invoke('toggle-extension',extId).then(function(res){
if(res.success){toast(res.enabled?'扩展已启用':'扩展已禁用','info');refreshExtensionsList()}
else{toast('操作失败: '+res.error,'warning')}
}).catch(function(e){toast('IPC调用失败: '+e.message,'warning')})
};
window._flUninstallExt=function(extId){
if(!ELEC||!ELEC.ipcRenderer){toast('IPC不可用','warning');return}
ELEC.ipcRenderer.invoke('remove-extension',extId).then(function(res){
if(res.success){toast('扩展已卸载','info');refreshExtensionsList()}
else{toast('卸载失败: '+res.error,'warning')}
}).catch(function(e){toast('IPC调用失败: '+e.message,'warning')})
};
function refreshExtensionsList(){
if(!ELEC||!ELEC.ipcRenderer)return;
ELEC.ipcRenderer.invoke('get-all-extensions').then(function(e){
extensions=e.map(function(ext){return{id:ext.id,name:ext.name,version:ext.version,enabled:true}});
var tab=tabs.find(function(t){return t.id===activeTabId});
if(tab&&tab.type==='extensions')renderPage(activeTabId,'extensions')
}).catch(function(){extensions=[]})
}
window._flLoadExt=function(){
if(!settings.devMode){toast('请先开启开发者模式','warning');return}
if(!ELEC||!ELEC.ipcRenderer){toast('IPC不可用','warning');return}
ELEC.ipcRenderer.invoke('show-open-dialog',{properties:['openDirectory'],title:'选择扩展程序目录'}).then(function(res){
if(!res.canceled&&res.filePaths.length>0){
var extPath=res.filePaths[0];
toast('正在加载扩展...','info');
ELEC.ipcRenderer.invoke('load-extension',extPath).then(function(result){
if(result.success){toast('扩展 "'+result.name+'" 已安装','success');refreshExtensionsList()}
else{toast('安装失败: '+result.error,'warning')}
}).catch(function(e){toast('IPC调用失败: '+e.message,'warning')})
}
}).catch(function(e){toast('选择目录失败: '+e.message,'warning')})
};

function addToHistory(url){
var title=url;try{var ft=tabs.find(function(t){return t.id===activeTabId});if(ft&&ft.title)title=ft.title}catch(e){}
var existing=visitHistory.find(function(v){return v.url===url});
if(existing){existing.visits=(existing.visits||1)+1;existing.date=Date.now()}
else{visitHistory.push({url:url,title:title,visits:1,date:Date.now()})}
if(visitHistory.length>200)visitHistory=visitHistory.slice(-200);
try{localStorage.setItem('fl_vhist',JSON.stringify(visitHistory))}catch(e){}
historyItems.push({url:url,title:title,date:Date.now()});
}

function getTopSites(){return visitHistory.filter(function(v){return v.visits>1}).sort(function(a,b){return b.visits-a.visits}).slice(0,8)}

function showSuggestions(input){
var sug=G('urlSuggestions');if(!sug)return;
if(!input||input.length<1){hideSuggestions();return}
var inputLower=input.toLowerCase();
var matches=visitHistory.filter(function(v){return v.url.toLowerCase().indexOf(inputLower)!==-1||v.title.toLowerCase().indexOf(inputLower)!==-1}).sort(function(a,b){return b.visits-a.visits}).slice(0,6);
if(matches.length===0){hideSuggestions();return}
sug.innerHTML=matches.map(function(m,i){return'<div class="suggestion-item'+(i===0?' highlighted':'')+'" data-url="'+escAttr(m.url)+'"><span class="sug-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="var(--text3)"><circle cx="12" cy="12" r="10"/></svg></span><span style="flex:1;min-width:0;overflow:hidden"><span style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escHtml(m.title||m.url)+'</span><span class="sug-url">'+escHtml(m.url)+'</span></span><span style="font-size:10px;color:var(--text3)">'+m.visits+'次</span></div>'}).join('');
sug.querySelectorAll('.suggestion-item').forEach(function(el){el.addEventListener('click',function(){var u=this.dataset.url;if(u){navigate(u);hideSuggestions()}})});
sug.classList.add('show');
}

function hideSuggestions(){var s=G('urlSuggestions');if(s){s.classList.remove('show');s.innerHTML=''}}
var sugHighlightIdx=-1;
function navSuggestions(dir){
var sug=G('urlSuggestions');if(!sug)return;var items=sug.querySelectorAll('.suggestion-item');if(!items.length)return;
if(dir==='ArrowDown'){sugHighlightIdx=Math.min(sugHighlightIdx+1,items.length-1)}else{sugHighlightIdx=Math.max(sugHighlightIdx-1,0)}
items.forEach(function(el,i){el.classList.toggle('highlighted',i===sugHighlightIdx)});
var hi=sug.querySelector('.suggestion-item.highlighted');if(hi){var url=hi.dataset.url;if(url){var ui=G('urlInput');if(ui)ui.value=url}}
}

init();
})();
</script>
